name: release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release.yml'
      - 'awscli/**'
      - 'cloudfront_invalidate/**'
      - 'iam_access_credentials/**'
      - 'packages/**'
      - 's3_sync/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine next version
        id: git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --bump --unreleased
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.git-cliff.outputs.version != '' && steps.git-cliff.outputs.content != ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.git-cliff.outputs.version }}
          body: ${{ steps.git-cliff.outputs.content }}
          make_latest: "true"
          token: ${{ secrets.GITHUB_TOKEN }}
